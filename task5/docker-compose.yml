services:
  # The Back-end Service
  back-end:
    build:
      context: ./back-end
    image: softy-pinko-back-end:task4


  # The Front-end Service
  front-end:
    build:
      context: ./front-end
    image: softy-pinko-front-end:task4

  proxy:
      build:
        context: ./proxy
      image: softy-pinko-proxy:task5
      ports:
        - "80:80"
      depends_on:
        - back-end
        - front-end
